# Cassandra AI Review Configuration
# This file centralizes static settings for the reviewer.
# Precedence: CLI Arguments > Configuration File > Defaults

provider = "google"
model = "gemini-3.5-flash"
allow-url-fetch = true

# Path to an MCP configuration file.
mcp-config = "mcp.json"

# Additive guidelines to supplement the main prompt.
# These can be local file paths or named prompts from the library.
supplemental-guidelines = [
    ".cassandra/haiku-praise.md",
    ".cassandra/self-preservation.md",
    ".cassandra/drive-by-fixes.md"
]

[provider-options]
thinking-level = "high"
