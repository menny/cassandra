name: Release
on:
  push:
    tags:
      - 'v*'
jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          mkdir -p dist
          PLATFORMS=(
            "linux/amd64"
            "linux/arm64"
            "darwin/amd64"
            "darwin/arm64"
            "windows/amd64"
          )
          for PLATFORM in "${PLATFORMS[@]}"; do
            GOOS="${PLATFORM%%/*}"
            GOARCH="${PLATFORM##*/}"
            SUFFIX=""
            if [[ "$GOOS" == "windows" ]]; then SUFFIX=".exe"; fi

            echo "Building cassandra for $GOOS/$GOARCH..."
            GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
              -o "dist/cassandra-${GOOS}-${GOARCH}${SUFFIX}" \
              ./cmd/ai_reviewer

            echo "Building cassandra-github for $GOOS/$GOARCH..."
            GOOS="$GOOS" GOARCH="$GOARCH" go build \
              -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
              -o "dist/cassandra-github-${GOOS}-${GOARCH}${SUFFIX}" \
              ./cmd/github
          done
          ls -lh dist/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --generate-notes \
            --title "Cassandra ${{ github.ref_name }}" \
            dist/cassandra-*
