name: Cassandra Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: AI Code Review
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Check out code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add Eyes Reaction
        id: add_reaction
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          REACTION_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions -f content='eyes' --jq '.id // empty')
          echo "reaction_id=$REACTION_ID" >> $GITHUB_OUTPUT

      - name: Setup Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: cassandra-review
          repository-cache: true

      - name: Run Cassandra Review
        run: |
          bazel run //:ai-review-agent -- \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --provider google \
            --model gemini-3-flash-preview \
            --provider-api-key "${{ secrets.GEMINI_API_KEY }}" \
            --cwd="${{ github.workspace }}" \
            --review-output-file "review.md"

      - name: Post AI Review Comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          TAG="<!-- cassandra-ai-review -->"
          
          # Append the tag for persistence
          echo -e "\n\n$TAG" >> review.md

          # Find if a comment with this tag already exists
          COMMENT_ID=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq ".comments[] | select(.body | contains(\"$TAG\")) | .id" | head -n 1)

          if [ -n "$COMMENT_ID" ]; then
            echo "Updating existing comment $COMMENT_ID..."
            gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -F body=@review.md
          else
            echo "Creating new comment..."
            gh pr comment ${{ github.event.pull_request.number }} --body-file review.md
          fi

      - name: Remove Eyes Reaction
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          REACTION_ID="${{ steps.add_reaction.outputs.reaction_id }}"
          if [ -n "$REACTION_ID" ]; then
            gh api -X DELETE repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions/$REACTION_ID
          fi

