name: 'Cassandra AI Review'
description: 'AI-powered code review for your pull requests using Cassandra.'
inputs:
  provider:
    description: 'LLM provider to use (google, anthropic)'
    required: true
    default: 'google'
  model_id:
    description: 'LLM provider model id'
    required: true
    default: 'gemini-3-flash-preview'
  provider_api_key:
    description: 'API key for the selected provider'
    required: true
  base:
    description: 'Base commit/branch for diff'
    required: false
    default: 'main'
  head:
    description: 'Head commit/branch for diff'
    required: false
    default: 'HEAD'
  working_directory:
    description: 'Working directory to review'
    required: false
    default: '.'
  main_guidelines:
    description: 'Path to a file overriding the built-in main guidelines'
    required: false
  reviewer_github_token:
    description: 'GitHub token for posting comments'
    required: false
    default: ${{ github.token }}
runs:
  using: 'composite'
  steps:
    - name: Prepare GitHub Token
      shell: bash
      env:
        PROVIDED_TOKEN: ${{ inputs.reviewer_github_token }}
        DEFAULT_TOKEN: ${{ github.token }}
      run: |
        # Fallback if the provided token is empty (e.g. secret not found)
        FINAL_TOKEN="$PROVIDED_TOKEN"
        if [[ -z "$FINAL_TOKEN" ]]; then
          echo "::warning::reviewer_github_token is empty. Falling back to default GITHUB_TOKEN."
          FINAL_TOKEN="$DEFAULT_TOKEN"
        fi

        if [[ -z "$FINAL_TOKEN" ]]; then
          echo "::error::No GitHub token available. Cannot continue."
          exit 1
        fi

        # Export to GITHUB_ENV so it's available to all subsequent steps and used by 'gh' CLI
        echo "GITHUB_TOKEN=$FINAL_TOKEN" >> $GITHUB_ENV
    - name: Add Eyes Reaction
      if: github.event.pull_request.number != ''
      shell: bash
      continue-on-error: true
      run: |
        REACTION_ID=$(gh api repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions -f content='eyes' --jq '.id // empty')
        if [ -n "$REACTION_ID" ]; then
          echo "CASSANDRA_REACTION_ID=$REACTION_ID" >> $GITHUB_ENV
        fi
    - name: Setup Bazel
      uses: bazel-contrib/setup-bazel@0.18.0
      with:
        bazelisk-cache: true
        disk-cache: cassandra-ai-review
        repository-cache: true
    - name: Run AI Review
      shell: bash
      env:
        PROVIDER_API_KEY: ${{ inputs.provider_api_key }}
      run: |
        # Use a fixed path in the workspace for the review output
        REVIEW_FILE="${{ github.workspace }}/cassandra_review.md"

        ARGS=(
          --provider "${{ inputs.provider }}"
          --model "${{ inputs.model_id }}"
          --provider-api-key "$PROVIDER_API_KEY"
          --base "${{ inputs.base }}"
          --head "${{ inputs.head }}"
          --cwd "${{ github.workspace }}/${{ inputs.working_directory }}"
          --review-output-file "$REVIEW_FILE"
        )

        if [[ -n "${{ inputs.main_guidelines }}" ]]; then
          # Ensure path is absolute for the agent
          ARGS+=(--main-guidelines "${{ github.workspace }}/${{ inputs.main_guidelines }}")
        fi

        # Execute via Bazel in the action's source directory
        cd "${{ github.action_path }}"
        bazel run //:ai-review-agent -- "${ARGS[@]}"

        # Export the review file path for the next step
        echo "REVIEW_FILE=$REVIEW_FILE" >> $GITHUB_ENV
    - name: Post AI Review Comment
      if: github.event.pull_request.number != ''
      shell: bash
      run: |
        TAG="<!-- cassandra-ai-review -->"

        # Append the tag for persistence (using printf for reliability)
        printf "\n\n%s\n" "$TAG" >> "$REVIEW_FILE"

        # Find if a comment with this tag already exists
        COMMENT_ID=$(gh pr view ${{ github.event.pull_request.number }} --json comments --jq ".comments[] | select(.body | contains(\"$TAG\")) | .url" | head -n 1 | sed 's/.*#issuecomment-//')

        if [ -n "$COMMENT_ID" ]; then
          echo "Updating existing comment $COMMENT_ID..."
          gh api -X PATCH "repos/${{ github.repository }}/issues/comments/$COMMENT_ID" -F body=@"$REVIEW_FILE"
        else
          echo "Creating new comment..."
          gh pr comment ${{ github.event.pull_request.number }} --body-file "$REVIEW_FILE"
        fi
    - name: Remove Eyes Reaction
      if: always() && github.event.pull_request.number != ''
      shell: bash
      continue-on-error: true
      run: |
        if [ -n "$CASSANDRA_REACTION_ID" ]; then
          gh api -X DELETE repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/reactions/$CASSANDRA_REACTION_ID
        fi
