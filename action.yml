name: 'Cassandra AI Review'
description: 'AI-powered code review for your pull requests using Cassandra.'
branding:
  icon: 'eye'
  color: 'purple'
inputs:
  provider:
    description: 'LLM provider to use (google, anthropic, openai)'
    required: false
  model_id:
    description: 'LLM provider model id'
    required: false
  provider_api_key:
    description: 'API key for the selected provider'
    required: true
  provider_url:
    description: 'Optional API endpoint URL override (useful for OpenAI-compatible providers like Ollama)'
    required: false
    default: ''
  config_file:
    description: 'Path to a configuration file (toml)'
    required: false
  base:
    description: 'Base commit/branch for diff'
    required: false
  head:
    description: 'Head commit/branch for diff'
    required: false
  working_directory:
    description: 'Working directory to review'
    required: false
    default: '.'
  main_guidelines:
    description: 'Path to a file or a named prompt from the library (general, asana-do-try-consider, google, conventional-comments, palantir, minimalist, security-first)'
    required: false
  supplemental_guidelines:
    description: 'Additive guidelines to supplement the main guidelines. Multiline string where each line is a path or library prompt name.'
    required: false
    default: ''
  approval_evaluation_prompt_file:
    description: 'Optional path to a file containing custom approval evaluation guidelines'
    required: false
    default: ''
  metadata_tag:
    description: 'Tag to identify Cassandra comments (inner text only, will be wrapped in <!-- ... -->)'
    required: false
    default: 'cassandra-ai-review-${{ github.workflow }}'
  reviewer_github_token:
    description: 'GitHub token for posting comments and managing reactions'
    required: false
    default: ${{ github.token }}
  reaction_icon:
    description: 'The reaction icon to add to the PR description while the review is in progress (e.g., eyes, rocket, heart).'
    required: false
    default: 'eyes'
  use_inline_comments:
    description: 'Whether to post inline comments to the PR (requires the reviewer to output a structured JSON file).'
    required: false
    default: 'true'
  submit_review_action:
    description: 'Whether to allow the AI to submit "approve/reject" actions or force it to only "comment". Options: "true" (allow approve/reject), "false" (force to "comment").'
    required: false
    default: 'false'
  delete_old_comments:
    description: 'Whether to delete previous bot-authored inline comments before posting a new review to keep the PR clean.'
    required: false
    default: 'true'
  mcp_config:
    description: 'Path to an mcp.json file configuring custom tools for the reviewer'
    required: false
    default: ''
  max_tokens:
    description: 'Max tokens for the LLM response'
    required: false
outputs:
  review_file:
    description: 'Path to the generated markdown review file.'
    value: ${{ steps.set_outputs.outputs.review_file }}
  json_file:
    description: 'Path to the structured JSON review file (only set when the JSON file was successfully created).'
    value: ${{ steps.set_outputs.outputs.json_file }}
  approved:
    description: 'The approval action from the review: APPROVE, REQUEST_CHANGES, or COMMENT.'
    value: ${{ steps.set_outputs.outputs.approved }}
  review_rationale:
    description: 'The high-level rationale for the approval decision.'
    value: ${{ steps.set_outputs.outputs.review_rationale }}
runs:
  using: 'composite'
  steps:
    - name: Prepare GitHub Token
      id: prepare_token
      shell: bash
      env:
        PROVIDED_TOKEN: ${{ inputs.reviewer_github_token }}
        DEFAULT_TOKEN: ${{ github.token }}
      run: |
        # Fallback if the provided token is empty (e.g. secret not found)
        FINAL_TOKEN="$PROVIDED_TOKEN"
        if [[ -z "$FINAL_TOKEN" ]]; then
          echo "::warning::reviewer_github_token is empty. Falling back to default GITHUB_TOKEN."
          FINAL_TOKEN="$DEFAULT_TOKEN"
        fi

        if [[ -z "$FINAL_TOKEN" ]]; then
          echo "::error::No GitHub token available. Cannot continue."
          exit 1
        fi

        # Mask the token so it doesn't show up in logs
        echo "::add-mask::$FINAL_TOKEN"
        echo "token=$FINAL_TOKEN" >> $GITHUB_OUTPUT
    - name: Fetch Pre-built Binaries
      id: fetch_binaries
      shell: bash
      env:
        ACTION_REF: ${{ github.action_ref }}
        ACTION_REPO: menny/cassandra
        GH_TOKEN: ${{ steps.prepare_token.outputs.token }}
      run: |
        # Map runner os/arch to Go os/arch
        # See: https://docs.github.com/en/actions/learn-github-actions/contexts#runner-context
        case "${{ runner.os }}" in
          Linux) GOOS="linux" ;;
          macOS) GOOS="darwin" ;;
          Windows) GOOS="windows" ;;
          *) GOOS="unsupported" ;;
        esac

        case "${{ runner.arch }}" in
          X64) GOARCH="amd64" ;;
          ARM64) GOARCH="arm64" ;;
          *) GOARCH="unsupported" ;;
        esac

        SUFFIX=""
        if [[ "$GOOS" == "windows" ]]; then SUFFIX=".exe"; fi

        BIN_CASSANDRA="cassandra-${GOOS}-${GOARCH}${SUFFIX}"
        BIN_GITHUB="cassandra-github-${GOOS}-${GOARCH}${SUFFIX}"

        mkdir -p "${{ runner.temp }}/bin"

        DOWNLOAD_SUCCESS="false"
        # Only attempt to download if it looks like a version tag (vX.Y.Z) and gh CLI is available
        if [[ "$GOOS" != "unsupported" ]] && [[ "$GOARCH" != "unsupported" ]] && [[ "$ACTION_REF" =~ ^v[0-9] ]] && command -v gh >/dev/null 2>&1; then
          echo "Attempting to download pre-built binaries for release: $ACTION_REF from repo: $ACTION_REPO..."
          if gh release download "$ACTION_REF" -p "$BIN_CASSANDRA" -p "$BIN_GITHUB" -D "${{ runner.temp }}/bin" -R "$ACTION_REPO" ; then
            # Verify both files actually exist before marking as success
            if [[ -f "${{ runner.temp }}/bin/$BIN_CASSANDRA" ]] && [[ -f "${{ runner.temp }}/bin/$BIN_GITHUB" ]]; then
              echo "Successfully downloaded pre-built binaries."
              chmod +x "${{ runner.temp }}/bin/$BIN_CASSANDRA"
              chmod +x "${{ runner.temp }}/bin/$BIN_GITHUB"
              DOWNLOAD_SUCCESS="true"
            else
              echo "One or more binaries were missing after download. Will fallback to Bazel."
            fi
          else
            echo "Failed to download binaries for $ACTION_REF. Will fallback to Bazel."
          fi
        else
          echo "Platform not supported for pre-built binaries, not running from a specific tag/release ($ACTION_REF), or gh CLI not available. Will use Bazel."
        fi

        echo "download_success=$DOWNLOAD_SUCCESS" >> $GITHUB_OUTPUT
        echo "bin_dir=${{ runner.temp }}/bin" >> $GITHUB_OUTPUT
        echo "bin_cassandra=${{ runner.temp }}/bin/$BIN_CASSANDRA" >> $GITHUB_OUTPUT
        echo "bin_github=${{ runner.temp }}/bin/$BIN_GITHUB" >> $GITHUB_OUTPUT
    - name: Setup Bazel
      if: steps.fetch_binaries.outputs.download_success != 'true'
      uses: bazel-contrib/setup-bazel@083175551ceeceebc757ebee2127fde78840ca77 # 0.18.0
      with:
        bazelisk-cache: true
        disk-cache: cassandra-ai-review
        repository-cache: true
    - name: Setup Execution Environment
      id: setup_env
      shell: bash
      run: |
        mkdir -p "${{ runner.temp }}/bin"

        if [[ "${{ steps.fetch_binaries.outputs.download_success }}" == "true" ]]; then
          echo "CASSANDRA_BIN=${{ steps.fetch_binaries.outputs.bin_cassandra }}" >> $GITHUB_ENV
          echo "GITHUB_BIN=${{ steps.fetch_binaries.outputs.bin_github }}" >> $GITHUB_ENV
        else
          # Create wrapper scripts that call bazel
          CASSANDRA_WRAPPER="${{ runner.temp }}/bin/cassandra_wrapper.sh"
          cat << 'EOF' > "$CASSANDRA_WRAPPER"
        #!/bin/bash
        cd "${{ github.action_path }}"
        exec bazel run //cmd/ai_reviewer:ai_reviewer -- "$@"
        EOF
          chmod +x "$CASSANDRA_WRAPPER"

          GITHUB_WRAPPER="${{ runner.temp }}/bin/github_wrapper.sh"
          cat << 'EOF' > "$GITHUB_WRAPPER"
        #!/bin/bash
        cd "${{ github.action_path }}"
        exec bazel run //cmd/github:github -- "$@"
        EOF
          chmod +x "$GITHUB_WRAPPER"

          echo "CASSANDRA_BIN=$CASSANDRA_WRAPPER" >> $GITHUB_ENV
          echo "GITHUB_BIN=$GITHUB_WRAPPER" >> $GITHUB_ENV
        fi
    - name: Add Status Reaction
      if: github.event.pull_request.number != ''
      shell: bash
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ steps.prepare_token.outputs.token }}
        REACTION_ICON: ${{ inputs.reaction_icon }}
      run: |
        REACTION_ID=$("$GITHUB_BIN" add-reaction --repo-full-name "${{ github.repository }}" --pr "${{ github.event.pull_request.number }}" --content "$REACTION_ICON")
        if [ -n "$REACTION_ID" ]; then
          echo "CASSANDRA_REACTION_ID=$REACTION_ID" >> $GITHUB_ENV
        fi
    - name: Fetch PR Metadata
      if: github.event.pull_request.number != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.prepare_token.outputs.token }}
        METADATA_TAG: ${{ inputs.metadata_tag }}
      run: |
        METADATA_FILE="${{ runner.temp }}/cassandra_metadata.json"
        "$GITHUB_BIN" get-metadata --repo-full-name "${{ github.repository }}" --pr "${{ github.event.pull_request.number }}" --tag "$METADATA_TAG" --output "$METADATA_FILE"
        echo "METADATA_FILE=$METADATA_FILE" >> $GITHUB_ENV
    - name: Fetch PR Context
      if: github.event.pull_request.number != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.prepare_token.outputs.token }}
      run: |
        DIFF_FILE="${{ runner.temp }}/cassandra_diff.diff"
        FILES_LIST_FILE="${{ runner.temp }}/cassandra_files.txt"
        COMMITS_FILE="${{ runner.temp }}/cassandra_commits.txt"

        "$GITHUB_BIN" get-diff --repo-full-name "${{ github.repository }}" --pr "${{ github.event.pull_request.number }}" --output "$DIFF_FILE"
        "$GITHUB_BIN" get-files --repo-full-name "${{ github.repository }}" --pr "${{ github.event.pull_request.number }}" --output "$FILES_LIST_FILE"
        "$GITHUB_BIN" get-commits --repo-full-name "${{ github.repository }}" --pr "${{ github.event.pull_request.number }}" --output "$COMMITS_FILE"

        echo "DIFF_FILE=$DIFF_FILE" >> $GITHUB_ENV
        echo "FILES_LIST_FILE=$FILES_LIST_FILE" >> $GITHUB_ENV
        echo "COMMITS_FILE=$COMMITS_FILE" >> $GITHUB_ENV
    - name: Run AI Review
      shell: bash
      env:
        PROVIDER_API_KEY: ${{ inputs.provider_api_key }}
        PROVIDER: ${{ inputs.provider }}
        MODEL_ID: ${{ inputs.model_id }}
        PROVIDER_URL: ${{ inputs.provider_url }}
        CONFIG_FILE: ${{ inputs.config_file }}
        BASE: ${{ inputs.base }}
        HEAD: ${{ inputs.head }}
        WORKING_DIRECTORY: ${{ inputs.working_directory }}
        MAIN_GUIDELINES: ${{ inputs.main_guidelines }}
        SUPPLEMENTAL_GUIDELINES: ${{ inputs.supplemental_guidelines }}
        APPROVAL_EVALUATION_PROMPT_FILE: ${{ inputs.approval_evaluation_prompt_file }}
        MCP_CONFIG: ${{ inputs.mcp_config }}
        MAX_TOKENS: ${{ inputs.max_tokens }}
      run: |
        # Use temporary files for the review outputs
        REVIEW_FILE="${{ runner.temp }}/cassandra_review.md"
        JSON_FILE="${{ runner.temp }}/cassandra_review.json"

        ARGS=(
          --review-output-file "$REVIEW_FILE"
          --output-json "$JSON_FILE"
        )

        if [[ -n "$PROVIDER" ]]; then
          ARGS+=(--provider "$PROVIDER")
        fi
        if [[ -n "$MODEL_ID" ]]; then
          ARGS+=(--model "$MODEL_ID")
        fi
        if [[ -n "$PROVIDER_API_KEY" ]]; then
          ARGS+=(--provider-api-key "$PROVIDER_API_KEY")
        fi
        if [[ -n "$PROVIDER_URL" ]]; then
          ARGS+=(--provider-url "$PROVIDER_URL")
        fi
        if [[ -n "$MAX_TOKENS" ]]; then
          ARGS+=(--max-tokens "$MAX_TOKENS")
        fi

        if [[ -n "$CONFIG_FILE" ]]; then
          RESOLVED_CONFIG="${{ github.workspace }}/$WORKING_DIRECTORY/$CONFIG_FILE"
          if [[ -f "$RESOLVED_CONFIG" ]]; then
            ARGS+=(--config "$RESOLVED_CONFIG")
          else
            ARGS+=(--config "$CONFIG_FILE")
          fi
        fi

        if [[ -n "$BASE" ]]; then
          ARGS+=(--base "$BASE")
        fi
        if [[ -n "$HEAD" ]]; then
          ARGS+=(--head "$HEAD")
        fi
        if [[ -n "$WORKING_DIRECTORY" ]]; then
          ARGS+=(--cwd "${{ github.workspace }}/$WORKING_DIRECTORY")
        fi

        if [[ -n "$SUPPLEMENTAL_GUIDELINES" ]]; then
          while read -r line || [[ -n "$line" ]]; do
            if [[ -z "$line" ]]; then continue; fi
            # Try to resolve relative to workspace
            RESOLVED="${{ github.workspace }}/$WORKING_DIRECTORY/$line"
            if [[ -f "$RESOLVED" ]]; then
              ARGS+=(--supplemental-guidelines "$RESOLVED")
            else
              # Assume library name
              ARGS+=(--supplemental-guidelines "$line")
            fi
          done <<< "$SUPPLEMENTAL_GUIDELINES"
        fi

        if [[ -n "$MCP_CONFIG" ]]; then
          MCP_PATH="${{ github.workspace }}/$WORKING_DIRECTORY/$MCP_CONFIG"
          if [[ -f "$MCP_PATH" ]]; then
            ARGS+=(--mcp-config "$MCP_PATH")
          else
            # Try it as a relative path or literal if not found in the workspace
            ARGS+=(--mcp-config "$MCP_CONFIG")
          fi
        fi

        if [[ -f "$METADATA_FILE" ]]; then
          ARGS+=(--metadata-json "$METADATA_FILE")
        fi

        if [[ -f "$DIFF_FILE" ]]; then
          ARGS+=(--diff-file "$DIFF_FILE")
        fi

        if [[ -f "$FILES_LIST_FILE" ]]; then
          ARGS+=(--files-list-file "$FILES_LIST_FILE")
        fi

        if [[ -f "$COMMITS_FILE" ]]; then
          ARGS+=(--commits-file "$COMMITS_FILE")
        fi

        if [[ -n "$APPROVAL_EVALUATION_PROMPT_FILE" ]]; then
          EVAL_PROMPT="${{ github.workspace }}/$WORKING_DIRECTORY/$APPROVAL_EVALUATION_PROMPT_FILE"
          if [[ -f "$EVAL_PROMPT" ]]; then
            ARGS+=(--approval-evaluation-prompt-file "$EVAL_PROMPT")
          else
            # Try it as a relative path or literal if not found in the workspace
            ARGS+=(--approval-evaluation-prompt-file "$APPROVAL_EVALUATION_PROMPT_FILE")
          fi
        fi

        if [[ -n "$MAIN_GUIDELINES" ]]; then
          # Try to resolve main guidelines:
          # 1. As a path in the repo being reviewed
          # 2. As a named prompt in the action's library
          # The CLI handles both, but we try to provide an absolute path for the repo version.
          REPO_GUIDELINES="${{ github.workspace }}/$WORKING_DIRECTORY/$MAIN_GUIDELINES"
          if [[ -f "$REPO_GUIDELINES" ]]; then
            ARGS+=(--main-guidelines "$REPO_GUIDELINES")
          else
            ARGS+=(--main-guidelines "$MAIN_GUIDELINES")
          fi
        fi

        "$CASSANDRA_BIN" "${ARGS[@]}"

        # Export the review file path for the next step
        echo "REVIEW_FILE=$REVIEW_FILE" >> $GITHUB_ENV
        echo "JSON_FILE=$JSON_FILE" >> $GITHUB_ENV
    - name: Set Action Outputs
      id: set_outputs
      shell: bash
      run: |
        echo "review_file=$REVIEW_FILE" >> $GITHUB_OUTPUT
        if [[ -f "$JSON_FILE" ]]; then
          echo "json_file=$JSON_FILE" >> $GITHUB_OUTPUT
          APPROVED=$(jq -r '.approval.action // "COMMENT"' "$JSON_FILE")
          echo "approved=$APPROVED" >> $GITHUB_OUTPUT
          # Use a cryptographically random delimiter to safely handle multi-line rationale text
          DELIMITER=$(openssl rand -hex 16)
          {
            echo "review_rationale<<$DELIMITER"
            jq -r '.approval.rationale // ""' "$JSON_FILE"
            echo "$DELIMITER"
          } >> $GITHUB_OUTPUT
        fi
    - name: Post AI Review Comment
      if: github.event.pull_request.number != '' && inputs.use_inline_comments != 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.prepare_token.outputs.token }}
        METADATA_TAG: ${{ inputs.metadata_tag }}
      run: |
        "$GITHUB_BIN" post-comment --repo-full-name "${{ github.repository }}" --pr "${{ github.event.pull_request.number }}" --file "$REVIEW_FILE" --tag "$METADATA_TAG"
    - name: Post AI Structured Review
      if: github.event.pull_request.number != '' && inputs.use_inline_comments == 'true'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ steps.prepare_token.outputs.token }}
        METADATA_TAG: ${{ inputs.metadata_tag }}
        ALLOW_REVIEW_ACTION: ${{ inputs.submit_review_action }}
        DELETE_OLD_COMMENTS: ${{ inputs.delete_old_comments }}
      run: |
        ARGS=(
          post-structured-review
          --repo-full-name "${{ github.repository }}"
          --pr "${{ github.event.pull_request.number }}"
          --file "$JSON_FILE"
          --tag "$METADATA_TAG"
          --metadata-file "$METADATA_FILE"
        )

        if [[ "$ALLOW_REVIEW_ACTION" == "true" ]]; then
          ARGS+=(--allow-review-action)
        fi

        if [[ "$DELETE_OLD_COMMENTS" == "true" ]]; then
          ARGS+=(--delete-old-comments)
        else
          ARGS+=(--delete-old-comments=false)
        fi

        "$GITHUB_BIN" "${ARGS[@]}"
    - name: Remove Status Reaction
      if: always() && github.event.pull_request.number != ''
      shell: bash
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ steps.prepare_token.outputs.token }}
      run: |
        if [ -n "$CASSANDRA_REACTION_ID" ]; then
          "$GITHUB_BIN" remove-reaction --repo-full-name "${{ github.repository }}" --pr "${{ github.event.pull_request.number }}" --reaction-id "$CASSANDRA_REACTION_ID"
        fi
